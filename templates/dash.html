<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop</title>

    <link href="https://fonts.googleapis.com/css2?family=Story+Script&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='dash.css') }}">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <h1>MYshop.DZ</h1>

    <input type="text" placeholder="Search for phones, PCs..." class="search">

    <div class="nav-links">
        <a href="#">HOME</a>
        <a href="{{ url_for('cart') }}">🛒 CART</a>
        <a href="#">PHONES</a>
        <a href="#">LAPTOPS</a>
        <a href="#">ACCESORIES</a>
        <a href="{{ url_for('home') }}">LOGOUT</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Latest Tech, Best Prices</h1>
    <p>Discover top smartphones and powerful computers</p>
    <button>Shop Now</button>
</section>

<!-- PRODUCTS -->
<div class="products">

    {% for product in products %}
    <div class="card">

        <!-- FIXED IMAGE WRAPPER -->
        <div class="img-box">
            <img src="{{ url_for('static', filename='image/' + product.image) }}">
        </div>

        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <p class="price">${{ product.price }}</p>

        <a href="{{ url_for('add_to_cart', product_id=product.id) }}">
            <button class="buy-btn">🛒 Add to Cart</button>
        </a>

    </div>
    {% else %}
    <p style="color:white;">No products available</p>
    {% endfor %}

</div>

</body>
</html>
